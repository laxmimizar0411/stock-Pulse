version: "3.9"

# =============================================================================
# StockPulse Docker Compose — Development & Production
# =============================================================================
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d redis mongo  # Start only databases
#   docker compose logs -f backend    # Follow backend logs
#   docker compose down               # Stop everything
# =============================================================================

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: stockpulse-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "unset JMX_PORT; /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # Redis — Hot cache, alert queue, WebSocket pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stockpulse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # MongoDB — Primary document store (users, alerts, watchlists, portfolio)
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: stockpulse-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: stockpulse
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # PostgreSQL — Time-series & analytical layer (OHLCV, technicals, macro)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: stockpulse-postgres
    restart: unless-stopped
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: stockpulse_ts
      POSTGRES_USER: ${PG_USER:-stockpulse}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-stockpulse}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-stockpulse} -d stockpulse_ts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockpulse-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override database URLs to use Docker service names
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongo:27017
      TIMESERIES_DSN: postgresql://${PG_USER:-stockpulse}:${PG_PASSWORD:-stockpulse}@postgres:5432/stockpulse_ts
      EVENT_BUS_URL: kafka://kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # Frontend — React app (dev server)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockpulse-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # Apache Kafka — Event backbone (KRaft mode, no ZooKeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: stockpulse-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9093:9093"
    environment:
      # KRaft mode configuration (no ZooKeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Performance tuning
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Set to 3 in production
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days default

      # Compression
      KAFKA_COMPRESSION_TYPE: lz4

      # Auto-create topics disabled (we create them explicitly)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Cluster ID for KRaft
      CLUSTER_ID: "stockpulse-brain-kafka-cluster"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-metadata.sh --snapshot /tmp/kraft-combined-logs/__cluster_metadata-0/00000000000000000000.log --cluster-id stockpulse-brain-kafka-cluster 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - stockpulse

  # ---------------------------------------------------------------------------
  # Kafka UI — Web dashboard for Kafka topic management
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: stockpulse-kafka-ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: stockpulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - stockpulse

volumes:
  redis-data:
    driver: local
  mongo-data:
    driver: local
  pg-data:
    driver: local
  kafka-data:
    driver: local

networks:
  stockpulse:
    driver: bridge
