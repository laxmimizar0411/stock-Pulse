# =============================================================================
# StockPulse Redis Configuration
# =============================================================================
# Mount this file at /usr/local/etc/redis/redis.conf in the container.
# docker-compose.yml already does this automatically.
# =============================================================================

# --- Network ---
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# --- Memory Management ---
# Set a hard memory limit. Adjust based on your server RAM.
# Development: 256mb | Staging: 512mb | Production: 1gb+
maxmemory 256mb

# Eviction policy: remove least-recently-used keys when memory is full.
# Since StockPulse uses Redis as a cache, allkeys-lru is ideal.
maxmemory-policy allkeys-lru

# Sample 10 keys per eviction cycle for better accuracy (default: 5)
maxmemory-samples 10

# --- Persistence ---
# RDB snapshots — lightweight periodic backups.
# Save if at least 1 key changed in 900s, 10 in 300s, or 10000 in 60s.
save 900 1
save 300 10
save 60 10000

# RDB file settings
dbfilename dump.rdb
dir /data
rdbcompression yes
rdbchecksum yes

# AOF (Append Only File) — for durability of the alert queue.
# Disabled by default since StockPulse uses Redis primarily as cache.
# Enable in production if alert queue persistence is critical.
appendonly no
# appendfilename "appendonly.aof"
# appendfsync everysec

# --- Security ---
# Uncomment and set a strong password for production deployments.
# Clients must AUTH before executing commands.
# requirepass your_strong_password_here

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""

# --- Logging ---
loglevel notice
logfile ""

# --- Slow Log ---
# Log queries that take longer than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Client Limits ---
maxclients 100

# --- Lazy Freeing (async memory reclaim) ---
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
