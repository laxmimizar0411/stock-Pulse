<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1150" font-family="'Segoe UI', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="input" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
    <linearGradient id="hmm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b3b0e"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="nlp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065666"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="gov" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065666"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="rag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#322659"/>
      <stop offset="100%" style="stop-color:#6b46c1"/>
    </linearGradient>
    <linearGradient id="sector" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#3182ce"/>
    </linearGradient>
    <linearGradient id="agents" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b2c0e"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
    <linearGradient id="decision" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
    <linearGradient id="risk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b3a00"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <linearGradient id="shap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065666"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="out" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a29"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" fill="#b8860b" font-size="18" font-weight="600">Phase 3: Intelligence + LLM Agents + Risk</text>

  <!-- Input -->
  <g filter="url(#shadow)">
    <rect x="200" y="48" width="600" height="40" rx="8" fill="url(#input)"/>
    <text x="500" y="73" text-anchor="middle" fill="#e2e8f0" font-size="12">IN: Swing signals from Phase 2 + raw text + market data</text>
  </g>

  <!-- Arrows from input to components -->
  <line x1="160" y1="90" x2="120" y2="115" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="330" y1="90" x2="310" y2="115" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="90" x2="510" y2="115" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="670" y1="90" x2="700" y2="115" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="820" y1="90" x2="890" y2="115" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Row 1: Analysis Components -->
  <g filter="url(#shadow)">
    <rect x="40" y="118" width="170" height="55" rx="8" fill="url(#hmm)"/>
    <text x="125" y="142" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">HMM Regime</text>
    <text x="125" y="162" text-anchor="middle" fill="#fbd38d" font-size="10">Bull/bear/sideways</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="225" y="118" width="170" height="55" rx="8" fill="url(#nlp)"/>
    <text x="310" y="142" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">FinBERT NLP</text>
    <text x="310" y="162" text-anchor="middle" fill="#a7f3d0" font-size="10">Hindi→En | NER | sentiment</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="410" y="118" width="190" height="55" rx="8" fill="url(#gov)"/>
    <text x="505" y="142" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Governance</text>
    <text x="505" y="162" text-anchor="middle" fill="#a7f3d0" font-size="10">Score 0-100, ban&lt;40</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="615" y="118" width="170" height="55" rx="8" fill="url(#rag)" stroke="#d6bcfa" stroke-width="1.5"/>
    <text x="700" y="142" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">RAG (Qdrant)</text>
    <text x="700" y="162" text-anchor="middle" fill="#d6bcfa" font-size="10">BM25 + semantic</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="118" width="170" height="55" rx="8" fill="url(#sector)" stroke="#bee3f8" stroke-width="1.5"/>
    <text x="885" y="142" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Sector Rotation</text>
    <text x="885" y="162" text-anchor="middle" fill="#bee3f8" font-size="10">RS + MFI + FII flows</text>
  </g>

  <!-- Row 1.5: New features -->
  <g filter="url(#shadow)">
    <rect x="40" y="185" width="170" height="42" rx="8" fill="url(#sector)" stroke="#bee3f8" stroke-width="1.5"/>
    <text x="125" y="207" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Dividend Intel</text>
    <text x="125" y="220" text-anchor="middle" fill="#bee3f8" font-size="9">Ex-date | Yield | Tax</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="225" y="185" width="170" height="42" rx="8" fill="url(#sector)" stroke="#bee3f8" stroke-width="1.5"/>
    <text x="310" y="207" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Reg. Calendar</text>
    <text x="310" y="220" text-anchor="middle" fill="#bee3f8" font-size="9">SEBI | RBI | Budget | Results</text>
  </g>

  <!-- Arrows to LangGraph -->
  <line x1="125" y1="175" x2="380" y2="262" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="175" x2="420" y2="262" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="505" y1="175" x2="500" y2="262" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="175" x2="580" y2="262" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LangGraph Multi-Agent -->
  <g filter="url(#shadow)">
    <rect x="120" y="265" width="760" height="210" rx="12" fill="url(#agents)"/>
    <text x="500" y="292" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">LangGraph Multi-Agent System (2-Tier LLM)</text>

    <!-- 4 analyst agents -->
    <g>
      <rect x="145" y="308" width="150" height="36" rx="6" fill="rgba(255,255,255,0.12)"/>
      <text x="220" y="330" text-anchor="middle" fill="#e2e8f0" font-size="11">Fund. analyst</text>
    </g>
    <g>
      <rect x="310" y="308" width="150" height="36" rx="6" fill="rgba(255,255,255,0.12)"/>
      <text x="385" y="330" text-anchor="middle" fill="#e2e8f0" font-size="11">Tech. analyst</text>
    </g>
    <g>
      <rect x="475" y="308" width="150" height="36" rx="6" fill="rgba(255,255,255,0.12)"/>
      <text x="550" y="330" text-anchor="middle" fill="#e2e8f0" font-size="11">Sent. analyst</text>
    </g>
    <g>
      <rect x="640" y="308" width="150" height="36" rx="6" fill="rgba(255,255,255,0.12)"/>
      <text x="715" y="330" text-anchor="middle" fill="#e2e8f0" font-size="11">Macro analyst</text>
    </g>

    <!-- Bull vs Bear -->
    <g>
      <rect x="145" y="360" width="170" height="36" rx="6" fill="rgba(255,255,255,0.10)"/>
      <text x="230" y="382" text-anchor="middle" fill="#e2e8f0" font-size="11">Bull researcher</text>
    </g>
    <text x="340" y="382" text-anchor="middle" fill="#fbd38d" font-size="14" font-weight="700">vs</text>
    <g>
      <rect x="365" y="360" width="170" height="36" rx="6" fill="rgba(255,255,255,0.10)"/>
      <text x="450" y="382" text-anchor="middle" fill="#e2e8f0" font-size="11">Bear researcher</text>
    </g>

    <!-- Trader + Risk -->
    <g>
      <rect x="565" y="360" width="140" height="36" rx="6" fill="rgba(255,255,255,0.10)"/>
      <text x="635" y="382" text-anchor="middle" fill="#e2e8f0" font-size="11">Trader agent</text>
    </g>
    <text x="718" y="382" text-anchor="middle" fill="#fbd38d" font-size="12">→</text>
    <g>
      <rect x="730" y="360" width="130" height="36" rx="6" fill="rgba(255,255,255,0.10)"/>
      <text x="795" y="382" text-anchor="middle" fill="#e2e8f0" font-size="11">Risk (veto)</text>
    </g>

    <!-- Synthesizer -->
    <g>
      <rect x="145" y="410" width="170" height="36" rx="6" fill="rgba(255,255,255,0.08)"/>
      <text x="230" y="432" text-anchor="middle" fill="#cbd5e0" font-size="11">Synthesizer</text>
    </g>

    <!-- LLM Tiers (2-tier only) -->
    <g>
      <rect x="480" y="410" width="380" height="36" rx="6" fill="rgba(255,255,255,0.12)"/>
      <text x="670" y="432" text-anchor="middle" fill="#fefcbf" font-size="12" font-weight="600">Tier 1: Claude/GPT-5 | Tier 2: GPT-4.1-mini</text>
    </g>
  </g>

  <!-- Arrow to Decision -->
  <line x1="500" y1="478" x2="500" y2="510" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision Cascade -->
  <g filter="url(#shadow)">
    <rect x="120" y="513" width="760" height="55" rx="10" fill="url(#decision)"/>
    <text x="500" y="538" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Decision cascade: Hunter-Guard → hard rules → Optuna ensemble → meta-label</text>
    <text x="500" y="556" text-anchor="middle" fill="#bee3f8" font-size="11">VIX cap | F&amp;O ban | SEBI margin | confidence &lt; 40% = killed</text>
  </g>

  <!-- Arrow to Risk -->
  <line x1="500" y1="570" x2="500" y2="602" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Risk Engine -->
  <g filter="url(#shadow)">
    <rect x="120" y="605" width="760" height="55" rx="10" fill="url(#risk)"/>
    <text x="500" y="630" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Risk management engine</text>
    <text x="500" y="648" text-anchor="middle" fill="#fbd38d" font-size="11">Kelly sizing | ATR stops | HRP allocation | regime throttle | VaR/CVaR | stress tests</text>
  </g>

  <!-- Arrow to SHAP -->
  <line x1="500" y1="662" x2="500" y2="694" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- SHAP -->
  <g filter="url(#shadow)">
    <rect x="200" y="697" width="600" height="50" rx="10" fill="url(#shap)"/>
    <text x="500" y="720" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">SHAP/LIME Explainability</text>
    <text x="500" y="738" text-anchor="middle" fill="#a7f3d0" font-size="11">Waterfall charts + natural language explanation per swing trade</text>
  </g>

  <!-- Arrow to OUT -->
  <line x1="500" y1="749" x2="500" y2="781" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- OUT -->
  <g filter="url(#shadow)">
    <rect x="100" y="784" width="800" height="50" rx="10" fill="url(#out)"/>
    <text x="500" y="806" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">OUT: Risk-bounded decisions + sizes + stops + sector allocation + explanations</text>
    <text x="500" y="824" text-anchor="middle" fill="#9ae6b4" font-size="11">→ Phase 4 (IPO/Tax/Validation) &amp; Phase 5 (Advanced ML)</text>
  </g>

  <!-- Legend -->
  <rect x="100" y="860" width="800" height="38" rx="6" fill="rgba(45,55,72,0.5)" stroke="#4a5568"/>
  <rect x="120" y="872" width="14" height="14" rx="3" stroke="#bee3f8" stroke-width="1.5" fill="none"/>
  <text x="140" y="884" fill="#bee3f8" font-size="11" font-weight="600">= New features (Sector Rotation, Dividend Intel, Reg Calendar, RAG)</text>
  <text x="560" y="884" fill="#a0aec0" font-size="11">Removed: Options, Local LLM (Tier 3), PSO Ensemble</text>
</svg>
